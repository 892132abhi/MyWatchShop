name: Django CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # --- JOB 1: TEST ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          cd Backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Migrations Check & Tests
        run: |
          cd Backend
          # This checks if your code has errors without needing a real DB
          python manage.py check 
          # Uncomment the line below if you have written tests
          # python manage.py test

  # --- JOB 2: DEPLOY (Only runs if Test passes) ---
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # We use -f Backend/Dockerfile because your file is in a subfolder
          docker build -t abhiramsreenarayanan/react-project-backend:latest -f Backend/Dockerfile .
          docker push abhiramsreenarayanan/react-project-backend:latest

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull abhiramsreenarayanan/react-project-backend:latest
            
            # Stop and remove the old container if it exists
            docker stop react-backend || true
            docker rm react-backend || true
            
            # Run the new container with all secrets
            docker run -d \
              --name react-backend \
              -p 8000:8000 \
              -e DB_NAME=postgres \
              -e DB_USER=postgres \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=5432 \
              -e ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }} \
              -e CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ORIGINS }} \
              -e CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_ORIGINS }} \
              -e SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https \
              abhiramsreenarayanan/react-project-backend:latest
            
            # Optional: Clean up old unused images to save space on EC2
            docker image prune -f