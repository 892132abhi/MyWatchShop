name: Deploy Backend to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t abhiramsreenarayanan/react-project-backend:latest .
          docker push abhiramsreenarayanan/react-project-backend:latest

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop react-backend || true
            docker rm react-backend || true
            docker pull abhiramsreenarayanan/react-project-backend:latest
            docker run -d \
              --name react-backend \
              -p 8000:8000 \
              -e DB_NAME=postgres \
              -e DB_USER=postgres \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=5432 \
              -e ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }} \
              -e CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ORIGINS }} \
              -e CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_ORIGINS }} \
              -e SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https \
              abhiramsreenarayanan/react-project-backend:latest