name: Deploy Backend to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.abhiramsreenarayanan }}
          password: ${{ secrets.dckr_pat_67efjE4sufAMoeGFugBQUShp_oc }}

      - name: Build and Push Docker Image
        run: |
          docker build -t abhiramsreenarayanan/react-project-backend:latest .
          docker push abhiramsreenarayanan/react-project-backend:latest

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.13.206.83.51 }}
          username: ubuntu
          key: ${{ secrets.-----BEGIN RSA PRIVATE KEY----------END RSA PRIVATE KEY----- }}
          script: |
            docker stop react-backend || true
            docker rm react-backend || true
            docker pull abhiramsreenarayanan/react-project-backend:latest
            docker run -d \
              --name react-backend \
              -p 8000:8000 \
              -e DB_NAME=postgres \
              -e DB_USER=postgres \
              -e DB_PASSWORD=${{ secrets.abhiram8921 }} \
              -e DB_HOST=${{ secrets.watchshop-db.c1g0a60cm6r6.ap-south-1.rds.amazonaws.com }} \
              -e DB_PORT=5432 \
              -e ALLOWED_HOSTS=${{ secrets.watchflow.duckdns.org,13.206.83.51 }} \
              -e CORS_ALLOWED_ORIGINS=${{ secrets.https://my-watch-shop.vercel.app }} \
              -e CSRF_TRUSTED_ORIGINS=${{ secrets.https://my-watch-shop.vercel.app,https://watchflow.duckdns.org }} \
              -e SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https \
              abhiramsreenarayanan/react-project-backend:latest